# Nome da aplicacao mostrado pelo Spring.
spring.application.name=sistema-cabeleireiro

# Porta em que a API vai rodar.
server.port=8080

# Endereco do banco H2 em memoria.
# Como ele esta em memoria, os dados somem quando a aplicacao para.
spring.datasource.url=jdbc:h2:mem:cabeleireirodb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita a tela web do H2 para consultar o banco no navegador.
spring.h2.console.enabled=true

# Faz o Spring executar os scripts schema.sql e data.sql automaticamente.
spring.sql.init.mode=always

# Deixa o JSON mais bonito e identado nas respostas.
spring.jackson.serialization.indent_output=true
